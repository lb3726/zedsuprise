#pin-gate {
      position: fixed; inset: 0; z-index: 9999;
      background: #02040a;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .5s ease;

      gap: 0; user-select: none; width: 300px;

      font-size: 13px; letter-spacing: .24em; color: var(--ink-soft);
      text-transform: uppercase; margin-bottom: 36px;
    }
.pg-dots {
      display: flex; gap: 18px; margin-bottom: 44px;
    }
.pg-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--ink-faint);
      transition: background .15s, border-color .15s, transform .15s;

      display: grid; grid-template-columns: repeat(3, 1fr);

      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
.pg-key:hover  { background: rgba(201,163,98,.15); border-color: var(--gold-dark); }
.pg-error {
      font-family: 'Special Elite', monospace; font-size: 13px; letter-spacing: .18em; color: var(--red); text-transform: uppercase;
      margin-top: 24px; height: 16px; opacity: 0;
      transition: opacity .2s;
    }

      font-family: 'Special Elite', monospace; font-size: 14px;
      padding: 12px 14px; background: rgba(255,255,255,0.04);
      color: var(--ink); border: 1px solid rgba(201,163,98,.22);
      letter-spacing: .04em; outline: none;
      transition: border-color .2s ease, background .2s ease;
    }
#login-form input:focus {
      border-color: var(--gold); background: rgba(255,255,255,.06);

      padding: 12px 18px; margin-top: 4px;
      background: var(--gold); color: var(--bg);
      border: none; cursor: pointer; letter-spacing: .25em;
      text-transform: uppercase; transition: opacity .2s ease, transform .1s ease;
    }

  function _twParents(){

    var known = ['zedsuprise.pages.dev', 'localhost'];

    var counted = false;

    if (!wrappedEl) return;
    function easeOut(t){ return 1 - Math.pow(1-t, 3); }
    function countUp(el, target, ms){
      var t0 = performance.now();

      var isMillions = el.textContent.indexOf('M') !== -1;
      (function tick(now){
        var p = Math.min((now - t0) / ms, 1);
        var val = Math.round(easeOut(p) * target);
        el.textContent = isMillions
          ? (val >= 1000000 ? (val/1000000).toFixed(2) + 'M' : val.toLocaleString())
          : val.toLocaleString();
        if(p < 1) requestAnimationFrame(tick);
      })(t0);
    }
    new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting && !counted){
          counted = true;
          document.querySelectorAll('[data-count]').forEach(function(el, i){
            setTimeout(function(){ countUp(el, +el.dataset.count, 1800); }, i * 180 + 300);

  (function(){
    var finale = document.getElementById('finale');
    if(!finale) return;
    var fired = false;

    var canvas = document.createElement('canvas');
    canvas.id = 'confetti-canvas';
    document.body.appendChild(canvas);
    var ctx = canvas.getContext('2d');

    var pieces = [];
    var COLORS = ['#4a9eff','#c9a362','#dce8f5','#b8342e','#2870cc','#f0e6d0'];

    function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize, { passive: true });

    function spawn(){
      resize();
      canvas.classList.add('active');
      pieces = [];
      for(var i = 0; i < 140; i++){
        pieces.push({
          x: Math.random() * canvas.width,
          y: canvas.height * 0.3 + Math.random() * canvas.height * 0.25,
          w: 7 + Math.random() * 7,
          h: 3 + Math.random() * 4,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          rot: Math.random() * Math.PI * 2,
          vx: (Math.random() - 0.5) * 3,
          vy: -3 - Math.random() * 5,
          vrot: (Math.random() - 0.5) * 0.15,
          alpha: 1
        });
      }
      requestAnimationFrame(loop);
    }

    function loop(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      var alive = false;
      pieces.forEach(function(p){
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.07;
        p.rot += p.vrot;
        if(p.y < canvas.height * 0.05 || p.y > canvas.height * 0.95) p.alpha -= 0.022;
        if(p.alpha > 0){
          alive = true;
          ctx.save();
          ctx.globalAlpha = Math.max(0, p.alpha);
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
          ctx.restore();
        }
      });
      if(alive) requestAnimationFrame(loop);
      else canvas.classList.remove('active');
    }

    new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting && !fired){
          fired = true;
          setTimeout(spawn, 400);
        }
      });
    }, { threshold: 0.3 }).observe(finale);
  })();

  var st=document.createElement('style'); st.id='wow-facade-css'; st.textContent=CSS;

    });

<script id="lola-player">
(function(){
  if(window.__lolaPlayer) return; window.__lolaPlayer=1;

  var CSS='#lola .lola-stage{cursor:pointer;transition:border-color .3s ease;}'
    +'#lola .lola-stage:hover{border-color:rgba(212,175,109,.5);}'

    +'#lola video.lola-video-frame{width:100%;height:100%;display:block;background:#000;object-fit:contain;border-radius:12px;}'
    +'#lola .lola-err{font-family:"Special Elite",monospace;font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);opacity:.85;text-align:center;padding:0 24px;line-height:1.8;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}'
    +'#lola .lola-retry{font-family:"Special Elite",monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#0c1426;background:var(--gold,#c9a24a);border:0;border-radius:8px;padding:11px 24px;cursor:pointer;transition:transform .2s ease,background .2s ease;}'
    +'#lola .lola-retry:hover{transform:translateY(-2px);background:#d8b566;}';
  var st=document.createElement('style'); st.id='lola-player-css'; st.textContent=CSS;
  (document.head||document.documentElement).appendChild(st);
  function showErr(stage){
    stage.classList.remove('is-playing');
    stage.innerHTML='<div class="lola-err"><div>Lola&#39;s edit couldn&#39;t load.</div><button type="button" class="lola-retry">&#9654;&nbsp; Try again</button></div>';
  }
  function playLola(stage){
    stage.classList.add('is-playing');
    var v=document.createElement('video'); v.className='lola-video-frame';
    v.setAttribute('controls',''); v.setAttribute('playsinline',''); v.setAttribute('preload','metadata');
    v.setAttribute('poster','/photos/lola-poster.webp');
    v.src=STREAM;
    v.addEventListener('error',function(){ showErr(stage); });
    stage.innerHTML=''; stage.appendChild(v);
    try{ var p=v.play(); if(p&&p.catch) p.catch(function(){}); }catch(_){}
  }
  document.addEventListener('click',function(e){
    if(!e.target.closest) return;
    var retry=e.target.closest('#lola .lola-retry');
    if(retry){ var rs=retry.closest('.lola-stage'); if(rs) playLola(rs); return; }
    var stage=e.target.closest('#lola .lola-stage'); if(!stage) return;
    if(stage.classList.contains('is-playing')) return;
    playLola(stage);
  },true);
})();
</script>
<script id="video-analytics">

(function(){
  if(window.__vidAnalytics) return; window.__vidAnalytics=1;
  function nameFor(v){
    if(!v||v.tagName!=='VIDEO') return null;
    if(v.classList.contains('wow-video-frame')) return 'the-moment';
    if(v.classList.contains('lola-video-frame')) return 'lola';
    if(v.id==='hlv-video') return 'cassidy';
    return null;
  }
  function cap(ev,props){ try{ if(window.posthog&&posthog.capture) posthog.capture(ev,props); }catch(e){} }
  document.addEventListener('play', function(e){
    var v=e.target, name=nameFor(v); if(!name) return;
    if(v.__va) return; v.__va={m:{}};
    cap('video_play',{video:name});
    v.addEventListener('timeupdate', function(){
      var d=v.duration; if(!d||!isFinite(d)) return;
      var pct=v.currentTime/d*100;
      [25,50,75].forEach(function(mk){ if(pct>=mk && !v.__va.m[mk]){ v.__va.m[mk]=1; cap('video_progress',{video:name,milestone:mk}); } });
    });
    v.addEventListener('ended', function(){ if(!v.__va.m[100]){ v.__va.m[100]=1; cap('video_complete',{video:name}); } });
  }, true);
})();
</script>
<script id="gallery-copy-link">
(function(){
  var SVG='<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>';
  var LABEL='Copy photo link';
  function css(){ if(document.getElementById('gcl-style'))return; var s=document.createElement('style'); s.id='gcl-style'; s.textContent='.gallery-copy-btn.copied{border-color:var(--gold)!important;background:rgba(201,163,98,.12)!important;}'; document.head.appendChild(s); }
  function copyLink(link,ondone){
    function fb(){ try{ var t=document.createElement('textarea'); t.value=link; t.style.cssText='position:fixed;opacity:0;'; document.body.appendChild(t); t.focus(); t.select(); document.execCommand('copy'); document.body.removeChild(t);}catch(_){ } ondone(); }
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(link).then(ondone,fb); } else { fb(); }
  }
  function placeInline(){
    var gal=document.getElementById('gallery'); if(!gal) return false;
    var open=gal.querySelector('.gallery-open-btn[data-action="open-gallery"]');
    var foot=open?open.parentNode:gal.querySelector('.gsl-foot');
    if(!foot||!open) return false;
    if(foot.querySelector('.gallery-copy-btn')) return true;
    css();
    var btn=document.createElement('button'); btn.type='button';
    btn.className='gallery-open-btn gallery-copy-btn';
    btn.setAttribute('aria-label','Copy a direct link to the current photo');
    btn.innerHTML=SVG+'<span class="gcl-label">'+LABEL+'</span>';
    btn.addEventListener('click',function(e){ e.preventDefault(); e.stopPropagation();
      var img=document.getElementById('gsl-img'); var link=(img&&img.getAttribute('src'))?img.src:''; var lbl=btn.querySelector('.gcl-label');
      if(!link){ lbl.textContent='No photo'; setTimeout(function(){lbl.textContent=LABEL;},1400); return; }
      copyLink(link,function(){ lbl.textContent='Copied!'; btn.classList.add('copied'); setTimeout(function(){ lbl.textContent=LABEL; btn.classList.remove('copied'); },1800); });
    });
    foot.appendChild(btn); return true;
  }
  function obase(b){ b.style.background='rgba(255,255,255,.06)'; b.style.color='rgba(220,232,245,.7)'; b.style.borderColor='rgba(255,255,255,.1)'; }
  function ohi(b){ b.style.background='rgba(201,163,98,.15)'; b.style.color='var(--gold)'; b.style.borderColor='var(--gold-dark)'; }
  function placeOverlay(){
    var grid=document.getElementById('ov-grid-btn'); if(!grid) return false;
    var bar=grid.parentNode; if(!bar) return false;
    if(bar.querySelector('.ov-copy-btn')) return true;
    var btn=document.createElement('button'); btn.type='button'; btn.className='ov-copy-btn';
    btn.setAttribute('aria-label','Copy a direct link to this photo');
    btn.style.cssText='display:inline-flex;align-items:center;gap:8px;height:38px;padding:0 14px;border:1px solid rgba(255,255,255,.1);border-radius:9px;font-family:Special Elite,monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:background .2s,color .2s,border-color .2s;';
    obase(btn);
    btn.innerHTML=SVG+'<span class="ovc-label">'+LABEL+'</span>';
    btn.onmouseenter=function(){ if(!btn.classList.contains('copied')) ohi(btn); };
    btn.onmouseleave=function(){ if(!btn.classList.contains('copied')) obase(btn); };
    btn.addEventListener('click',function(e){ e.preventDefault(); e.stopPropagation();
      var img=document.getElementById('ov-img'); var link=(img&&img.getAttribute('src'))?img.src:''; var lbl=btn.querySelector('.ovc-label');
      if(!link) return;
      copyLink(link,function(){ lbl.textContent='Copied!'; btn.classList.add('copied'); ohi(btn); btn.style.background='rgba(201,163,98,.22)'; btn.style.borderColor='var(--gold)'; setTimeout(function(){ lbl.textContent=LABEL; btn.classList.remove('copied'); obase(btn); },1800); });
    });
    bar.appendChild(btn); return true;
  }
  if(!placeInline()){ var mo1=new MutationObserver(function(){ if(placeInline()) mo1.disconnect(); }); mo1.observe(document.documentElement,{childList:true,subtree:true}); setTimeout(function(){ try{mo1.disconnect();}catch(_){} },25000); }
  if(!placeOverlay()){ var mo2=new MutationObserver(function(){ if(placeOverlay()) mo2.disconnect(); }); mo2.observe(document.body,{childList:true}); setTimeout(function(){ try{mo2.disconnect();}catch(_){} },600000); }
})();
</script>
